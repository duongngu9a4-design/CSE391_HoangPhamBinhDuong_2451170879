<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scroll Gallery</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { padding: 20px; background-color: #f9f9f9; }
        h1 { text-align: center; margin-bottom: 25px; color: #333; }

        /* GRID RESPONSIVE (Yêu cầu bài toán) */
        .gallery-grid {
            display: grid;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            /* Mặc định: 4 cột trên Desktop */
            grid-template-columns: repeat(4, 1fr);
        }
        @media (max-width: 992px) {
            /* 2 cột trên Tablet */
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 576px) {
            /* 1 cột trên Mobile */
            .gallery-grid { grid-template-columns: 1fr; }
        }

        /* Image Card Components */
        .photo-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
            height: 250px;
            display: flex;
            flex-direction: column;
        }
        .photo-card:hover { transform: translateY(-5px); }
        
        /* CSS Lazy Load */
        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #eaeaea; /* Màu nền giả lập khi ảnh chưa tải */
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .photo-img.loaded { opacity: 1; }

        /* Indicator & Trigger */
        #load-trigger {
            text-align: center;
            padding: 30px;
            font-size: 16px;
            color: #666;
            clear: both;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ccc;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 0.8s infinite linear;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* LIGHTBOX MODAL */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .lightbox.active { display: flex; }
        .lightbox-img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 4px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            animation: zoomIn 0.25s ease;
        }
        .lightbox-close {
            position: absolute;
            top: 20px; right: 30px;
            color: white; font-size: 40px;
            font-weight: bold; cursor: pointer;
        }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <h1>Photo Gallery</h1>

    <div id="galleryGrid" class="gallery-grid"></div>

    <div id="load-trigger">
        <div class="spinner"></div>
        <span>Đang tải thêm ảnh...</span>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img class="lightbox-img" id="lightboxImg" src="" alt="Large View">
    </div>

    <script src="app.js"></script>
</body>
</html>
