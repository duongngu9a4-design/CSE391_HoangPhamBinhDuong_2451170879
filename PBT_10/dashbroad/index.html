<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Source Dashboard</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #3498db;
            --danger: #e74c3c;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding: 30px; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header & Control Panel */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: var(--border-radius); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        h1 { font-size: 24px; }
        .stats-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .btn-refresh { background-color: var(--primary); color: white; border: none; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .btn-refresh:hover { background-color: #2980b9; }

        /* Dashboard Grid Layout */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        
        /* Widget Component Base */
        .widget { background: var(--card-bg); border-radius: var(--border-radius); padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); min-height: 280px; position: relative; display: flex; flex-direction: column; }
        .widget-title { font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 15px; border-bottom: 2px solid #f4f6f7; padding-bottom: 8px; }
        .widget-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }

        /* State Styles: Inside Widget Loading/Error */
        .w-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-muted); height: 100%; }
        .spinner { width: 35px; height: 35px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        .w-error { color: var(--danger); text-align: center; padding: 20px; font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .w-error-icon { font-size: 32px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Specific Widgets Rendering Styles */
        .weather-info { text-align: center; }
        .weather-temp { font-size: 48px; font-weight: bold; color: #111; margin: 10px 0; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .dog-img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background-color: #eaeaea; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Dashboard Tổng Hợp</h1>
            <p id="fetchTime" class="stats-text">Vừa mở trang, chuẩn bị tải dữ liệu...</p>
        </div>
        <button id="refreshBtn" class="btn-refresh">🔄 Refresh All</button>
    </header>

    <div class="dashboard-grid">
        <div class="widget" id="widget-0">
            <h3 class="widget-title">🌤️ Thời tiết Hà Nội</h3>
            <div class="widget-content" id="content-0"></div>
        </div>

        <div class="widget" id="widget-1">
            <h3 class="widget-title">👤 Thành viên ngẫu nhiên</h3>
            <div class="widget-content" id="content-1"></div>
        </div>

        <div class="widget" id="widget-2">
            <h3 class="widget-title">🐶 Thú cưng mỗi ngày</h3>
            <div class="widget-content" id="content-2"></div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
