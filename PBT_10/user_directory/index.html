<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory Management</title>
    <style>
        :root {
            --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --dark: #2c3e50; --gray: #f4f6f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { padding: 30px; background-color: #fcfcfc; color: var(--dark); }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { margin-bottom: 25px; text-align: center; color: var(--dark); }
        
        /* Layout split */
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        @media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }

        /* Controls & Form */
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
     
        .form-card { background: white; border: 1px solid #e1e4e6; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); height: fit-content; }
        
        .form-card h3 { margin-bottom: 15px; border-bottom: 2px solid var(--gray); padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { padding: 9px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-secondary { background: #95a5a6; color: white; width: 100%; margin-top: 5px; display: none; }

        /* Grid Users & Cards */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .user-card { background: white; border: 1px solid #e1e4e6; border-radius: 8px; padding: 20px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.03); transition: transform 0.2s; }
        .user-card:hover { transform: translateY(-2px); }
        .user-name { font-size: 18px; font-weight: bold; color: var(--dark); margin-bottom: 5px; }
        .user-email { color: #7f8c8d; font-size: 14px; margin-bottom: 15px; }
        .card-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-action { padding: 5px 10px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; color: white; }
        .btn-edit { background: var(--primary); }
        .btn-delete { background: var(--danger); }

        /* SKELETON LOADER */
        .skeleton { background: #f0f3f5; background-image: linear-gradient(90deg, #f0f3f5 0px, #e1e6e9 40px, #f0f3f5 80px); background-size: 600px; animation: shine-lines 1.6s infinite linear; }
        .skeleton-card { height: 140px; border-radius: 8px; border: 1px solid #e1e4e6; }
        @keyframes shine-lines { 0% { background-position: -100px; } 100% { background-position: 500px; } }

        /* TOAST ALERT SYSTEM */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 12px 25px; color: white; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-weight: 500; min-width: 25px; animation: slideIn 0.3s ease; }
        .toast.success { background-color: var(--success); }
        .toast.error { background-color: var(--danger); }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>User Directory Manager</h1>
    
    <div class="main-layout">
        <div>
            <div class="controls">
                <input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm theo tên hoặc email...">
            </div>
            <div id="userGrid" class="user-grid"></div>
        </div>

        <div class="form-card">
            <h3 id="formTitle">Thêm User Mới</h3>
            <form id="userForm">
                <input type="hidden" id="userIdField">
                <div class="form-group">
                    <label for="nameField">Tên hiển thị</label>
                    <input type="text" id="nameField" required placeholder="Ví dụ: Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label for="emailField">Địa chỉ Email</label>
                    <input type="email" id="emailField" required placeholder="username@domain.com">
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary">Lưu lại</button>
                <button type="button" id="cancelEditBtn" class="btn btn-secondary">Hủy cập nhật</button>
            </form>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
