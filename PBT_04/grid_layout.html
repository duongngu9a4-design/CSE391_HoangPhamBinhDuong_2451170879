<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid E-Commerce</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

<div class="layout">

    <header class="header">
        HEADER
    </header>

    <section class="hero">
        HERO BANNER - Featured Product
    </section>

    <aside class="sidebar">
        <h3>Filter</h3>
        <label><input type="checkbox"> Price < 100</label><br>
        <label><input type="checkbox"> Sale</label><br>
        <label><input type="checkbox"> New</label>
    </aside>

    <main class="main">
        <div class="card">Product 1</div>
        <div class="card">Product 2</div>
        <div class="card">Product 3</div>
        <div class="card">Product 4</div>
        <div class="card">Product 5</div>
        <div class="card">Product 6</div>

    </main>

    <aside class="ads">
        <figure>
            <img src="https://placehold.co/200x500" alt="ADS">
        </figure>
    </aside>

    <footer class="footer">
        FOOTER
    </footer>

</div>

</body>
</html>
